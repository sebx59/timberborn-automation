<div class="modal-overlay" *ngIf="show" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>State History Timeline</h2>
      <button class="close-btn" (click)="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="timeline-row" *ngFor="let key of activeKeys">
        <div class="timeline-label">{{ getLabel(key) }}</div>
        <div class="timeline-svg-container">
          <svg preserveAspectRatio="none" viewBox="0 0 1000 40" width="100%" height="40" class="timeline-svg">
            <path [attr.d]="getTimelinePath(key, 1000, 40)" fill="none" class="timeline-path"
              [class.path-on]="states[key]" />
          </svg>
        </div>
      </div>
      <div class="time-axis" *ngIf="hasVariables">
        <span>0s</span>
        <span>Now ({{ (currentRelativeTime / 1000).toFixed(1) }}s)</span>
      </div>
      <div *ngIf="!hasVariables" style="color: #94a3b8; text-align: center;">No variables active yet.</div>
    </div>
  </div>
</div>
